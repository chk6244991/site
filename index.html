<!DOCTYPE html> 
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Designs & SNS Content</title>
    <meta name="description" content="Portfolio showcasing menu designs and SNS promotional images.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>My Works</h1>
        <p>Menu Designs & SNS Creatives</p>
    </header>

    <!-- Profile Section -->
    <section class="profile">
        <img src="https://ui-avatars.com/api/?name=Designer&background=e1306c&color=fff&size=150" alt="Profile Image" class="profile-img">
        <p class="profile-desc">
            こんにちは！飲食店さま向けのメニュー表や、Instagram等で使える告知画像・バナーを制作しています。<br>
            「目に留まる」「伝わる」デザインを心がけています。お気軽にご相談ください！
        </p>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn-instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            Instagramを見る・DMで依頼
        </a>
    </section>

    <!-- Filter Buttons -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="menu">メニュー表</button>
        <button class="filter-btn" data-filter="special">スペシャルメニュー</button>
        <button class="filter-btn" data-filter="other">その他</button>
    </div>

    <!-- Gallery (Masonry Grid) -->
    <main class="gallery" id="gallery">
        <!-- スタッフ紹介 - 一番前 -->
        <article class="gallery-item" data-category="other">
            <img src="7.png" alt="スタッフ紹介">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">スタッフ紹介</h3>
            </div>
        </article>

        <!-- メニュー表 -->
        <article class="gallery-item" data-category="menu">
            <img src="1.png" alt="料金システム">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">料金システム</h3>
            </div>
        </article>

        <article class="gallery-item" data-category="menu">
            <img src="3.png" alt="Drink Menu">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">Drink Menu</h3>
            </div>
        </article>

        <article class="gallery-item" data-category="menu">
            <img src="4.png" alt="Liqueur / Milk メニュー">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">Liqueur / Milk メニュー</h3>
            </div>
        </article>

        <article class="gallery-item" data-category="menu">
            <img src="5.png" alt="ALCOHOL FREE / FOOD メニュー">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">ALCOHOL FREE / FOOD</h3>
            </div>
        </article>

        <!-- スペシャルメニュー -->
        <article class="gallery-item" data-category="special">
            <img src="8周年メニュー.JPG" alt="8周年スペシャルメニュー">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">8周年 Special Menu</h3>
            </div>
        </article>

        <!-- その他 -->
        <article class="gallery-item" data-category="other">
            <img src="2.png" alt="禁止事項">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">禁止事項</h3>
            </div>
        </article>

        <article class="gallery-item" data-category="other">
            <img src="6.png" alt="ボードゲームいちらんひょう">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">ボードゲーム一覧</h3>
            </div>
        </article>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
