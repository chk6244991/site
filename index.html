<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Designs & SNS Content</title>
    <meta name="description" content="Portfolio showcasing menu designs and SNS promotional images.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>My Works</h1>
        <p>Menu Designs & SNS Creatives</p>
    </header>

    <!-- Profile Section -->
    <section class="profile">
        <img src="https://ui-avatars.com/api/?name=Designer&background=c084fc&color=fff&size=150" alt="Profile Image" class="profile-img">
        <p class="profile-desc">
            こんにちは！飲食店さま向けのメニュー表や、Instagram等で使える告知画像・バナーを制作しています。<br>
            「目に留まる」「伝わる」デザインを心がけています。お気軽にご相談ください！
        </p>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn-instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            Instagramを見る・DMで依頼
        </a>
    </section>

    <!-- Filter Buttons -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="menu">メニュー表</button>
        <button class="filter-btn" data-filter="special">スペシャルメニュー</button>
        <button class="filter-btn" data-filter="other">その他</button>
    </div>

    <!-- Gallery (Album Cards) -->
    <main class="gallery" id="gallery">

        <!-- 旅BAR夢port メニューアルバム (cover: 7.png, slides: 7, 1, 3, 4, 5) -->
        <article class="gallery-item" data-category="menu"
            data-album="true"
            data-slides='["7.png","1.png","3.png","4.png","5.png"]'
            data-labels='["スタッフ紹介","料金システム","Drink Menu","Liqueur / Milk","ALCOHOL FREE / FOOD"]'>
            <img src="7.png" alt="旅BAR夢port メニュー">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">旅BAR夢port メニュー</h3>
            </div>
            <span class="album-badge">5枚</span>
        </article>

        <!-- 8周年スペシャルメニュー (single) -->
        <article class="gallery-item" data-category="special">
            <img src="8周年メニュー.JPG" alt="8周年 Special Menu">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">8周年 Special Menu</h3>
            </div>
        </article>

        <!-- その他アルバム (cover: 2.png, slides: 2, 6) -->
        <article class="gallery-item" data-category="other"
            data-album="true"
            data-slides='["2.png","6.png"]'
            data-labels='["禁止事項","ボードゲーム一覧"]'>
            <img src="2.png" alt="その他">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">その他</h3>
            </div>
            <span class="album-badge">2枚</span>
        </article>

    </main>

    <!-- Slideshow Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
            <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous">&#8249;</button>
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
            <button class="lightbox-next" id="lightbox-next" aria-label="Next">&#8250;</button>
            <p class="lightbox-caption" id="lightbox-caption"></p>
            <p class="lightbox-counter" id="lightbox-counter"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
