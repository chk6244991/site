<!DOCTYPE html> 
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Designs & SNS Content</title>
    <meta name="description" content="Portfolio showcasing menu designs and SNS promotional images.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>My Works</h1>
        <p>Menu Designs & SNS Creatives</p>
    </header>

    <!-- Profile Section -->
    <section class="profile">
        <img src="https://ui-avatars.com/api/?name=Designer&background=e1306c&color=fff&size=150" alt="Profile Image" class="profile-img">
        <p class="profile-desc">
            こんにちは！飲食店さま向けのメニュー表や、Instagram等で使える告知画像・バナーを制作しています。<br>
            「目に留まる」「伝わる」デザインを心がけています。お気軽にご相談ください！
        </p>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="btn-instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
            Instagramを見る・DMで依頼
        </a>
    </section>

    <!-- Filter Buttons -->
    <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて (All)</button>
        <button class="filter-btn" data-filter="menu">メニュー表 (Menu)</button>
        <button class="filter-btn" data-filter="sns">SNS告知画像 (SNS)</button>
        <button class="filter-btn" data-filter="other">その他 (Other)</button>
    </div>

    <!-- Gallery (Masonry Grid) -->
    <main class="gallery" id="gallery">
        <!-- Item 1: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="1.png" alt="メニュー表 1">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 1</h3>
            </div>
        </article>

        <!-- Item 2: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="2.png" alt="メニュー表 2">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 2</h3>
            </div>
        </article>

        <!-- Item 3: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="3.png" alt="メニュー表 3">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 3</h3>
            </div>
        </article>

        <!-- Item 4: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="4.png" alt="メニュー表 4">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 4</h3>
            </div>
        </article>

        <!-- Item 5: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="5.png" alt="メニュー表 5">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 5</h3>
            </div>
        </article>

        <!-- Item 6: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="6.png" alt="メニュー表 6">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 6</h3>
            </div>
        </article>

        <!-- Item 7: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="7.png" alt="メニュー表 7">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">メニュー表 7</h3>
            </div>
        </article>

        <!-- Item 8: Menu -->
        <article class="gallery-item" data-category="menu">
            <img src="8周年メニュー.JPG" alt="8周年メニュー">
            <div class="gallery-item-overlay">
                <h3 class="gallery-item-title">8周年メニュー</h3>
            </div>
        </article>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
